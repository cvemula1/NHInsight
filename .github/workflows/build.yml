name: Build

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check nhinsight/ tests/
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=nhinsight --cov-report=term-missing
      - name: Demo smoke test
        run: python -m nhinsight.cli demo

  docker:
    name: Docker Build & Test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nhinsight:${{ github.sha }} .

      - name: Smoke test — version
        run: docker run --rm nhinsight:${{ github.sha }} version

      - name: Smoke test — demo
        run: docker run --rm nhinsight:${{ github.sha }} demo

      - name: Smoke test — help
        run: docker run --rm nhinsight:${{ github.sha }} scan --help

      - name: Trivy scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            nhinsight:${{ github.sha }}
